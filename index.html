<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Mind Map | Prompt Frameworks · Observe with Satyam</title>
  <!-- Google Fonts & Font Awesome Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: radial-gradient(circle at 20% 30%, #0a0f2a, #030617);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      color: #f0f3ff;
    }

    /* header with channel identity */
    .channel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      padding: 20px 36px;
      background: rgba(10, 20, 40, 0.6);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(114, 137, 218, 0.4);
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
      position: relative;
      z-index: 20;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      background: linear-gradient(135deg, #ffffff10, #ffffff05);
      padding: 8px 24px 8px 20px;
      border-radius: 60px;
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255,255,255,0.2);
    }

    .brand-icon {
      font-size: 2.2rem;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
      background: linear-gradient(145deg, #ffb347, #ff6b6b);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 2px 4px rgba(0,0,0,0.2);
    }

    .brand-text {
      font-weight: 800;
      font-size: 1.5rem;
      letter-spacing: -0.3px;
      background: linear-gradient(120deg, #FFE6B0, #FFB347);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .subscribe-badge {
      background: rgba(255, 70, 85, 0.9);
      backdrop-filter: blur(8px);
      padding: 8px 22px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 6px 14px rgba(0,0,0,0.3);
      border: 1px solid rgba(255,180,100,0.6);
      transition: 0.2s;
    }

    .subscribe-badge i {
      font-size: 1.2rem;
      color: #ffdf80;
    }

    /* main mind map canvas */
    .mindmap-container {
      position: relative;
      width: 100%;
      min-height: 85vh;
      margin: 20px auto 40px auto;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: visible;
    }

    #mindMapCanvas {
      position: relative;
      width: 100%;
      height: 100%;
      min-height: 70vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* central hub */
    .central-hub {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 15;
      width: 210px;
      height: 210px;
      background: radial-gradient(circle at 30% 30%, #ffd966, #ff8c42);
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      box-shadow: 0 20px 35px rgba(0,0,0,0.5), 0 0 0 6px rgba(255,215,120,0.3), inset 0 2px 5px rgba(255,255,200,0.6);
      backdrop-filter: blur(2px);
      transition: all 0.2s ease;
      border: 2px solid #fff9e0;
    }

    .central-hub i {
      font-size: 3rem;
      filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.3));
      color: #2c1a0c;
    }

    .central-hub h3 {
      font-size: 1.3rem;
      font-weight: 800;
      margin-top: 10px;
      color: #1f2a0e;
      background: rgba(255,245,200,0.7);
      padding: 4px 12px;
      border-radius: 40px;
    }

    .central-hub p {
      font-size: 0.75rem;
      font-weight: 600;
      color: #2e241f;
      background: rgba(255,250,210,0.8);
      border-radius: 20px;
      padding: 3px 12px;
      margin-top: 8px;
    }

    /* framework cards (nodes) */
    .framework-node {
      position: absolute;
      width: 200px;
      background: rgba(20, 30, 55, 0.85);
      backdrop-filter: blur(12px);
      border-radius: 28px;
      padding: 16px 12px;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      box-shadow: 0 15px 30px -10px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255,215,140,0.3);
      border: 1px solid rgba(255,215,140,0.5);
      text-align: center;
      z-index: 12;
    }

    .framework-node:hover {
      transform: scale(1.05);
      background: rgba(35, 50, 85, 0.95);
      box-shadow: 0 20px 30px -8px black, 0 0 0 2px #ffbc6e;
      border-color: #ffc285;
    }

    .node-title {
      font-weight: 800;
      font-size: 1.4rem;
      letter-spacing: -0.3px;
      background: linear-gradient(135deg, #FFD966, #FFB347);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 8px;
    }

    .node-fullform {
      font-size: 0.7rem;
      font-weight: 500;
      background: rgba(0,0,0,0.5);
      padding: 4px 8px;
      border-radius: 20px;
      display: inline-block;
      color: #cfdeff;
      margin-top: 4px;
    }

    .node-badge {
      font-size: 0.7rem;
      margin-top: 10px;
      color: #ffda99;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    /* svg connection lines */
    .lines-svg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 5;
    }

    .lines-svg path {
      stroke: url(#gradientStroke);
      stroke-width: 2.5;
      fill: none;
      stroke-dasharray: 5 3;
      filter: drop-shadow(0 0 3px rgba(255,200,100,0.6));
    }

    /* modal overlay - amazing & intuitive */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(12px);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      visibility: hidden;
      opacity: 0;
      transition: 0.2s ease;
    }

    .modal-overlay.active {
      visibility: visible;
      opacity: 1;
    }

    .modal-card {
      background: linear-gradient(145deg, #121b2f, #0a1022);
      border-radius: 48px;
      max-width: 550px;
      width: 90%;
      padding: 28px 26px;
      border: 1px solid rgba(255, 200, 100, 0.6);
      box-shadow: 0 30px 40px rgba(0,0,0,0.6);
      transition: transform 0.2s;
      animation: modalPop 0.25s ease-out;
    }

    @keyframes modalPop {
      from { transform: scale(0.92); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      border-bottom: 2px solid #ffb347;
      padding-bottom: 12px;
      margin-bottom: 20px;
    }

    .modal-header h2 {
      font-size: 1.8rem;
      font-weight: 800;
      background: linear-gradient(120deg, #ffd966, #ffa559);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .close-modal {
      font-size: 1.8rem;
      cursor: pointer;
      color: #ffbb77;
      transition: 0.1s;
    }

    .modal-section {
      margin-bottom: 20px;
    }

    .modal-section h4 {
      font-size: 1rem;
      letter-spacing: 1px;
      color: #ffc285;
      margin-bottom: 6px;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .modal-section p, .modal-section li {
      font-size: 0.9rem;
      line-height: 1.45;
      color: #eef3ff;
    }

    .example-box {
      background: #00000040;
      padding: 12px;
      border-radius: 20px;
      border-left: 4px solid #ffb347;
      font-family: monospace;
      font-size: 0.8rem;
    }

    .footer-note {
      text-align: center;
      margin: 20px auto 30px;
      font-size: 0.8rem;
      max-width: 800px;
      background: rgba(0,0,0,0.4);
      border-radius: 80px;
      padding: 12px 24px;
      backdrop-filter: blur(5px);
      color: #bfd6ff;
      display: inline-block;
      width: auto;
    }

    .footer-wrap {
      text-align: center;
    }

    @media (max-width: 780px) {
      .framework-node {
        width: 170px;
        padding: 12px 8px;
      }
      .node-title {
        font-size: 1.2rem;
      }
      .central-hub {
        width: 160px;
        height: 160px;
      }
      .central-hub i {
        font-size: 2rem;
      }
      .brand-text {
        font-size: 1.2rem;
      }
      .channel-header {
        padding: 12px 20px;
      }
    }
  </style>
</head>
<body>

<div class="channel-header">
  <div class="brand">
    <i class="fas fa-brain brand-icon"></i>
    <span class="brand-text">Observe with satyam</span>
  </div>
  <div class="subscribe-badge">
    <i class="fab fa-youtube"></i> 
    <span>SUBSCRIBE</span> 
    <i class="fas fa-bell"></i>
  </div>
</div>

<div class="mindmap-container">
  <div id="mindMapCanvas">
    <!-- central hub -->
    <div class="central-hub">
      <i class="fas fa-project-diagram"></i>
      <h3>🧠 PROMPT<br>FRAMEWORKS</h3>
      <p>mind map · 9 pillars</p>
    </div>

    <!-- SVG lines container -->
    <svg class="lines-svg" id="linesSVG"></svg>
    <!-- dynamic framework nodes will be injected here -->
  </div>
</div>

<div class="footer-wrap">
  <div class="footer-note">
    <i class="fas fa-lightbulb"></i> ✨ CLICK ANY NODE → full form, meaning, real-life use cases & ready prompt ✨ <i class="fas fa-mind-share"></i>
  </div>
</div>

<!-- Modal Structure -->
<div id="frameworkModal" class="modal-overlay">
  <div class="modal-card">
    <div class="modal-header">
      <h2 id="modalTitle">Framework</h2>
      <i class="fas fa-times-circle close-modal"></i>
    </div>
    <div id="modalContent">
      <!-- dynamic content -->
    </div>
  </div>
</div>

<script>
  // --------------------------------------------------------------
  // COMPLETE FRAMEWORKS DATA (Full table info: Full form, Simple meaning, Use cases, Prompt example)
  // --------------------------------------------------------------
  const frameworksData = [
    {
      name: "RACE",
      fullForm: "Role, Action, Context, Expectation",
      simpleMeaning: "Tell AI who it is, what to do, and how you want output",
      useCases: "Writing clear WhatsApp messages, emails to boss/HR, captions, summarizing notes, explaining topics simply.",
      promptExample: "“Act as a career mentor (Role). Help me draft a leave message to my manager (Action). I need leave for a family function (Context). Keep it polite and short (Expectation).”"
    },
    {
      name: "CLEAR",
      fullForm: "Context, Learn, Evaluate, Action, Review",
      simpleMeaning: "Learn something → test → improve",
      useCases: "Studying for exams, revising topics, practicing MCQs, improving weak subjects, interview prep.",
      promptExample: "“I am preparing for exams (Context). Teach me ‘Inflation’ simply (Learn). Give 5 MCQs (Evaluate). Provide revision notes (Action). Tell common mistakes (Review).”"
    },
    {
      name: "5W1H",
      fullForm: "What, Why, Who, When, Where, How",
      simpleMeaning: "Break confusion into clear questions",
      useCases: "Choosing career, planning trips, starting side hustle, understanding news/topics, decision making.",
      promptExample: "“I want to start freelancing. Explain: What options exist, Why they work, Who should do it, When to start, Where to find clients, How to begin.”"
    },
    {
      name: "PASTOR",
      fullForm: "Problem, Amplify, Story, Transformation, Offer, Response",
      simpleMeaning: "Make people feel + take action",
      useCases: "Writing LinkedIn posts, reels scripts, convincing clients, storytelling, marketing.",
      promptExample: "“Write a post: Problem – people waste time online. Amplify – they lose growth. Story – someone improved using better habits. Transformation – results achieved. Offer – simple tip. Response – ask readers to try.”"
    },
    {
      name: "STAR",
      fullForm: "Situation, Task, Action, Result",
      simpleMeaning: "Explain with real example + outcome",
      useCases: "Answering interview questions, explaining achievements, college answers, group discussions.",
      promptExample: "“Answer ‘Tell me about a challenge’ using STAR where a student handled a team conflict during a fest.”"
    },
    {
      name: "FAB",
      fullForm: "Feature, Advantage, Benefit",
      simpleMeaning: "Explain why something is useful",
      useCases: "Convincing a friend, selling a service, pitching yourself, explaining value of a skill.",
      promptExample: "“Explain why learning communication skills is important using FAB in simple language.”"
    },
    {
      name: "RISE",
      fullForm: "Role, Identify, Steps, Expectation",
      simpleMeaning: "Improve weak or average output",
      useCases: "Fixing boring captions, improving emails, upgrading assignments, rewriting content.",
      promptExample: "“Act as an editor (Role). Identify problems in this paragraph (Identify). Suggest improvements (Steps). Rewrite it in engaging tone (Expectation).”"
    },
    {
      name: "GROW",
      fullForm: "Goal, Reality, Options, Will",
      simpleMeaning: "Turn goals into actionable plan",
      useCases: "Planning month, building habits, career direction, improving productivity.",
      promptExample: "“My goal is to wake up early (Goal). Analyze current routine (Reality). Suggest options (Options). Create 14-day action plan (Will).”"
    },
    {
      name: "SOAP",
      fullForm: "Subject, Objective, Action, Plan",
      simpleMeaning: "Communicate clearly & professionally",
      useCases: "Writing leave emails, client updates, explaining delays, formal communication.",
      promptExample: "“Write an email using SOAP about delay in project and next steps to complete it professionally.”"
    }
  ];

  // references
  const container = document.getElementById("mindMapCanvas");
  const svgLine = document.getElementById("linesSVG");
  let nodes = [];   // store DOM elements

  // create nodes and inject into container
  function createNodes() {
    frameworksData.forEach((fw, idx) => {
      const nodeDiv = document.createElement("div");
      nodeDiv.className = "framework-node";
      nodeDiv.setAttribute("data-idx", idx);
      nodeDiv.innerHTML = `
        <div class="node-title">${fw.name}</div>
        <div class="node-fullform">${fw.fullForm}</div>
        <div class="node-badge"><i class="fas fa-info-circle"></i> click for insights</div>
      `;
      nodeDiv.addEventListener("click", (e) => {
        e.stopPropagation();
        showModal(fw);
      });
      container.appendChild(nodeDiv);
      nodes.push(nodeDiv);
    });
  }

  // position nodes in a perfect circle around center hub
  let resizeObserver = null;
  function positionNodesAndLines() {
    if (!nodes.length) return;
    const containerRect = container.getBoundingClientRect();
    const centerX = containerRect.width / 2;
    const centerY = containerRect.height / 2;
    
    // radius depends on screen size - dynamic & beautiful
    let baseRadius = Math.min(containerRect.width * 0.32, containerRect.height * 0.32, 280);
    if (containerRect.width < 700) baseRadius = Math.min(containerRect.width * 0.35, 200);
    
    const angleStep = (Math.PI * 2) / nodes.length;
    
    nodes.forEach((node, i) => {
      const angle = i * angleStep - Math.PI / 2; // start from top
      const nodeWidth = node.offsetWidth;
      const nodeHeight = node.offsetHeight;
      const x = centerX + baseRadius * Math.cos(angle) - nodeWidth / 2;
      const y = centerY + baseRadius * Math.sin(angle) - nodeHeight / 2;
      node.style.left = `${x}px`;
      node.style.top = `${y}px`;
      node.style.position = "absolute";
    });
    
    drawConnectionLines(centerX, centerY, containerRect);
  }
  
  // draw curved lines from central hub to each node center
  function drawConnectionLines(centerX, centerY, containerRect) {
    svgLine.innerHTML = ''; // clear
    // set SVG dimensions to container dimensions
    svgLine.setAttribute('width', containerRect.width);
    svgLine.setAttribute('height', containerRect.height);
    
    // define gradient for stylish lines
    const defs = document.createElementNS("http://www.w3.org/2000/svg", "defs");
    const gradient = document.createElementNS("http://www.w3.org/2000/svg", "linearGradient");
    gradient.setAttribute("id", "gradientStroke");
    gradient.setAttribute("gradientUnits", "userSpaceOnUse");
    gradient.setAttribute("x1", "0%");
    gradient.setAttribute("y1", "0%");
    gradient.setAttribute("x2", "100%");
    gradient.setAttribute("y2", "0%");
    const stop1 = document.createElementNS("http://www.w3.org/2000/svg", "stop");
    stop1.setAttribute("offset", "0%");
    stop1.setAttribute("stop-color", "#ffb347");
    const stop2 = document.createElementNS("http://www.w3.org/2000/svg", "stop");
    stop2.setAttribute("offset", "100%");
    stop2.setAttribute("stop-color", "#ffd966");
    gradient.appendChild(stop1);
    gradient.appendChild(stop2);
    defs.appendChild(gradient);
    svgLine.appendChild(defs);
    
    nodes.forEach(node => {
      const nodeRect = node.getBoundingClientRect();
      const containerRectAbs = container.getBoundingClientRect();
      // relative to SVG parent container
      const nodeCenterX = nodeRect.left + nodeRect.width / 2 - containerRectAbs.left;
      const nodeCenterY = nodeRect.top + nodeRect.height / 2 - containerRectAbs.top;
      
      // center hub absolute coordinates inside container
      const hubElem = document.querySelector(".central-hub");
      const hubRect = hubElem.getBoundingClientRect();
      const hubCenterX = hubRect.left + hubRect.width / 2 - containerRectAbs.left;
      const hubCenterY = hubRect.top + hubRect.height / 2 - containerRectAbs.top;
      
      const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
      // bezier curve for organic mind map look
      const midX = (hubCenterX + nodeCenterX) / 2;
      const midY = (hubCenterY + nodeCenterY) / 2 - 12;
      const control1 = { x: hubCenterX + (nodeCenterX - hubCenterX) * 0.25, y: hubCenterY - 10 };
      const control2 = { x: nodeCenterX - (nodeCenterX - hubCenterX) * 0.25, y: nodeCenterY - 8 };
      const d = `M ${hubCenterX} ${hubCenterY} C ${control1.x} ${control1.y}, ${control2.x} ${control2.y}, ${nodeCenterX} ${nodeCenterY}`;
      path.setAttribute("d", d);
      path.setAttribute("stroke", "url(#gradientStroke)");
      path.setAttribute("stroke-width", "2.2");
      path.setAttribute("fill", "none");
      path.setAttribute("stroke-dasharray", "6 4");
      svgLine.appendChild(path);
    });
  }
  
  // modal display with full info (full form, simple meaning, use cases, prompt)
  function showModal(framework) {
    const modal = document.getElementById("frameworkModal");
    const modalTitle = document.getElementById("modalTitle");
    const modalContentDiv = document.getElementById("modalContent");
    
    modalTitle.innerText = `${framework.name} · Framework`;
    
    modalContentDiv.innerHTML = `
      <div class="modal-section">
        <h4><i class="fas fa-expand-alt"></i> FULL FORM</h4>
        <p style="font-weight:500;">${framework.fullForm}</p>
      </div>
      <div class="modal-section">
        <h4><i class="fas fa-seedling"></i> SIMPLE MEANING</h4>
        <p>${framework.simpleMeaning}</p>
      </div>
      <div class="modal-section">
        <h4><i class="fas fa-users"></i> REAL-LIFE USE CASES</h4>
        <p>${framework.useCases}</p>
      </div>
      <div class="modal-section">
        <h4><i class="fas fa-comment-dots"></i> READY-TO-USE PROMPT EXAMPLE</h4>
        <div class="example-box">
          <i class="fas fa-quote-left" style="margin-right:6px;"></i> ${framework.promptExample}
        </div>
      </div>
      <div class="modal-section">
        <h4><i class="fas fa-lightbulb"></i> MIND MAP INSIGHT</h4>
        <p>⚡ ${framework.name} helps structure prompts like a pro — from clarity to influence.</p>
      </div>
    `;
    modal.classList.add("active");
  }
  
  function closeModal() {
    const modal = document.getElementById("frameworkModal");
    modal.classList.remove("active");
  }
  
  // resize handler to recalculate positions & lines
  let resizeTimer;
  function handleResize() {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => {
      if (nodes.length) {
        positionNodesAndLines();
      }
    }, 100);
  }
  
  // initialize mind map with radial arrangement
  function initMindMap() {
    createNodes();
    // wait for DOM render to get node dimensions
    setTimeout(() => {
      positionNodesAndLines();
      window.addEventListener("resize", handleResize);
    }, 50);
    // re-run after images/fonts load
    window.addEventListener("load", () => positionNodesAndLines());
  }
  
  // modal close event
  document.querySelector(".close-modal").addEventListener("click", closeModal);
  window.addEventListener("click", (e) => {
    const modal = document.getElementById("frameworkModal");
    if (e.target === modal) closeModal();
  });
  
  // start everything
  initMindMap();
  
  // additional dynamic observer in case fonts load changes
  if (window.ResizeObserver) {
    const observer = new ResizeObserver(() => {
      positionNodesAndLines();
    });
    observer.observe(container);
  }
</script>
</body>
</html>
